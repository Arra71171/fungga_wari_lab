name: Supabase Heartbeat

on:
  schedule:
    # Runs at 00:00 every Monday and Thursday
    - cron: '0 0 * * 1,4' 
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database
        run: |
          # We use a simple GET request to the 'stories' table.
          # The -I flag ensures we only fetch headers (keeps logs clean and reduces bandwidth).
          # This counts as active database usage and prevents the 7-day pause.
          curl -X GET "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/stories?select=id&limit=1" \
            -H "apikey: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            -I
