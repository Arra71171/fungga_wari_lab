name: Macroscope Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  comment:
    name: Trigger Macroscope Review
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post Comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr comment "$PR_URL" --body "@macroscope-app review"
